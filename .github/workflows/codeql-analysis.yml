# Advanced GitHub CodeQL code quality scanning configuration.
# Needed to exclude the generated frontend API stubs from scanning.
name: "CodeQL Advanced"

# NOTE: The following paths should match the paths in the config at the bottom
on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**/*.py"
      - "src/**/*.ts"
      - "!src/frontend/app/src/api-client/**"
      - "!src/frontend/app/src/auth-client/**"
      - "!**/test_*.py"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**/*.py"
      - "src/**/*.ts"
      - "!src/frontend/app/src/api-client/**"
      - "!src/frontend/app/src/auth-client/**"
      - "!**/test_*.py"
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: "ubuntu-latest"
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

        # Exclude generated files and overly sensitive findings that are usually intentional
        config: |
          paths:
            - "src/**/*.py"
            - "src/**/*.ts"
          paths-ignore:
            - "src/frontend/app/src/api-client/**"
            - "src/frontend/app/src/auth-client/**"
            - "**/test_*.py"
          query-filters:
            - exclude:
                id: py/mixed-returns
            - exclude:
                id: py/empty-except

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      with:
        category: "/language:${{matrix.language}}"
