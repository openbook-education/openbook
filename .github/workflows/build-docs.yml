name: "Build Documentation"

on:
    workflow_call: {}
    workflow_dispatch: {}
    pull_request:
        paths:
            - ".github/workflows/build-docs.yml"
            - ".readthedocs.yaml"
            - "poetry.lock"
            - "pyproject.toml"
            - "docs/**"
            - "src/openbook/**"
    push:
        branches:
            - main
        paths:
            - ".github/workflows/build-docs.yml"
            - ".readthedocs.yaml"
            - "poetry.lock"
            - "pyproject.toml"
            - "docs/**"
            - "src/openbook/**"

permissions:
    contents: read

jobs:
    build-docs:
        name: "Build Sphinx site"
        runs-on: ubuntu-latest

        steps:
            - name: "Checkout code"
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: "Set up CI environment"
              uses: ./.github/actions/setup-ci-environment
              with:
                  setup-python: "true"
                  setup-node: "true"

            - name: "Install documentation dependencies"
              run: |
                poetry install --no-interaction --with docs
                sudo apt-get install --yes graphviz

            - name: "Build documentation"
              run: |
                poetry run src/manage.py migrate
                poetry run npm run docs:build
